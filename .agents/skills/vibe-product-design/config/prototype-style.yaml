# ============================================================================
# 原型图风格配置（vibe-product-design · 模式 B 高保真原型图）
# ----------------------------------------------------------------------------
# 【这份文件的运行时位置】首次运行 style_prompt.ts 时，会把 skill 自带的这份模板
# 复制到你项目的 .context/vibe-product-design/config/ 下。之后请改 .context 里的
# 副本——运行时以它为准，skill 升级不会覆盖它。改 skill 目录里的模板不生效。
#
# 你只需要填两个字段：
#   1) platform      目标平台，只选一个（决定所有页面级原型图的尺寸与界面形态，强约束）
#   2) active_theme  风格主题，一句话（剩下的配色/字体/留白等由预处理用大模型展开并缓存）
#
# 工作流（由 scripts/style_prompt.ts 编排，用 `npx --yes tsx` 运行）：
#   active_theme（你写的一句话主题）
#     → 预处理：大模型据主题生成 generated/<slug>.style.md（风格提示词，缓存）
#     → 加载：出图时把该风格提示词拼在每张图的具体画面描述之前
#     → 交给 zenmux-image-generation 出图（尺寸取 platform 对应平台的 size）
# ============================================================================

# 目标平台——**只选一个**，这是强约束：本项目所有页面级原型图的分辨率、画幅与界面
# 形态（布局范式、导航结构、信息密度）都按这个平台出，不要混出别的端的图。
# 仅组件/局部特写这类非页面级配图可临时用别的尺寸（如 1024x1024 方形），风格仍须一致。
# —— 写成下面 platforms: 里的一个 key；要换端就改这里，不要在单次产出里私自切换。
platform: web

# 平台预设：key 是短名，size 是出图分辨率（gpt-image-2 要求 16 的倍数、长宽比 1:3–3:1）。
# 有特殊需求（如竖版海报屏）可自己加一个 key。
platforms:
  web:
    label: PC / 桌面 Web（横版 2K）
    size: 2560x1440
  mobile:
    label: 手机 App（竖版）
    size: 1024x1536
  tablet:
    label: iPad / 平板（横版 4:3）
    size: 2048x1536

# 当前生效的风格主题。默认苹果 (Apple) 设计风格。
# —— 写成 themes: 里的 key（推荐，缓存文件名可读），或直接写一句自由主题文本都行，
#    如   active_theme: 赛博朋克霓虹，暗色高对比，电子感
# 换了主题后重跑一次 plan，预处理会自动为新主题生成对应的风格提示词文件。
active_theme: apple

# 可选的主题预设：key 是短名（决定缓存文件名），value 是一句话主题描述。
# 想复用/命名自己的风格就在这里加一行；只想临时试一下就直接改上面的 active_theme 为自由文本。
themes:
  apple: 苹果 (Apple) Human Interface Guidelines 设计风格——清晰、直观、内容优先，圆角卡片与分组列表，系统蓝强调可交互元素，干净精致、可信赖
  dieter-rams: Dieter Rams「Less, but better」功能主义——理性、精确、少即是多，克制的单一强调色
  bold-playful: 年轻明快、友好活泼的消费级界面——鲜明主色、圆角卡片、饱满按钮，有亲和力
  dark-pro: 深色专业数据仪表盘——沉浸暗色背景、高信息密度、克制的强调色标注关键数据与状态

# 出图的模型与质量（所有主题、所有平台通用）。界面稿含大量中文文案 + 精细排版，对
# 文字渲染要求高，故默认高质量模型 + high；别用 fast/low 档，易糊字错字。
# 出图尺寸不在这里配——由上面的 platform 决定，脚本会把对应 size 一并返回。
rendering:
  # gpt-image-2：文字渲染稳、支持自定义尺寸（16 的倍数、长宽比 1:3–3:1），可直接出 2K。
  model: openai/gpt-image-2
  quality: high            # openai/* 模型的质量档位；密集文字必须 high
